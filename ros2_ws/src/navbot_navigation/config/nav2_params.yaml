amcl:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_footprint
    global_frame_id: map
    odom_frame_id: odom
    scan_topic: /scan
    transform_tolerance: 1.0
    tf_broadcast: true
    # Particle filter
    max_particles: 2000
    min_particles: 500
    update_min_d: 0.1
    update_min_a: 0.2
    resample_interval: 1
    laser_model_type: likelihood_field
    # 2026-04-23 (session 11): laser_max_range 16.0 → 8.0. RPLIDAR C1
    # useful range on this chassis is ~10 m; for the 3×3 m room
    # 8.0 m is ample and keeps AMCL from spending beam budget on
    # rays that won't terminate in our space.
    laser_max_range: 8.0
    laser_min_range: 0.15
    max_beams: 60
    # 2026-04-23: set_initial_pose true, fixed at map origin. The
    # map frame is defined relative to where we save the map from
    # SLAM — we save with the robot at its (0, 0, 0) SLAM origin,
    # so placing the robot at the same physical spot before
    # launching localization means the initial pose matches.
    # Operators who start elsewhere should publish /initialpose
    # manually (Foxglove 2D Pose Estimate, or ros2 topic pub).
    set_initial_pose: true
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_yaw: 0.0

map_server:
  ros__parameters:
    use_sim_time: false
    # 2026-04-23 (session 12): pointing at office_lab_v2, built with
    # a square-path drive covering 9.75 × 7.80 m (195×156 cells @
    # 0.05 m/pix). Doubled area vs session 11's v1 map. v1 retained
    # in the repo for reference. Overridable via launch arg `map`
    # in navbot_bringup/localization.launch.py.
    yaml_filename: /home/arif/projects/claude-navbot/maps/office_lab_v2.yaml

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 10.0
    node_names:
      - map_server
      - amcl

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    # 2026-04-22 (session 9): /odom → /odometry/filtered — consume the
    # EKF-fused output so Nav2 sees wheel-odom XY with IMU-stable yaw.
    odom_topic: /odometry/filtered
    # Increase BT action server timeouts for low-powered hardware.
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 5

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 30.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      # 2026-04-22 (session 8, post-first-success): tightened from
      # 0.15 m → 0.05 m XY. Generous tolerance was needed during first-
      # goal bring-up because we couldn't rule out odom drift; now that
      # firmware wheel_radius matches URDF (0.0325 m) the system can
      # resolve the last ~10 cm to the goal rather than accepting it
      # from beyond the xy_goal_tolerance annulus.
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.25
      stateful: true
    controller_plugins: ["FollowPath"]
    FollowPath:
      # 2026-04-22 (session 8): DWB → RegulatedPurePursuitController.
      # After reducing inflation_radius to 0.05 m and sim_time to 1.0 s,
      # DWB still commanded zero forward velocity with only oscillating
      # ±0.09 rad/s rotation, despite a clear forward corridor (1.36 m
      # to the nearest LiDAR return). Controller_server aborted with
      # "Failed to make progress." Critic-balance tuning for this
      # platform has now consumed two sessions without producing
      # forward motion; RPP's geometric approach (rotate-to-heading,
      # then track lookahead point) maps directly onto diff-drive and
      # exposes explicit linear-velocity floors instead of asking us
      # to reverse-engineer a critic weighting.
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      # Kinematics — matched to motor envelope (85 % ratio at 0.15 m/s,
      # reliable down to 0.005 m/s / 0.05 rad/s).
      desired_linear_vel: 0.15
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.4
      # 2026-04-22 (session 9): 1.5 → 1.0 rad/s². Terminal rotate-to-
      # goal-heading was overshooting 50–90° before damping back,
      # then oscillating until yaw_goal_tolerance fired. Lower
      # acceleration gives the controller room to decelerate before
      # the goal yaw. Paired with rotate_to_heading_angular_vel 0.5→0.3.
      max_angular_accel: 1.0
      # Lookahead — 0.3 m baseline; velocity-scaled so at 0.15 m/s the
      # carrot sits ~0.225 m ahead, tightening as the robot slows.
      lookahead_dist: 0.3
      min_lookahead_dist: 0.2
      max_lookahead_dist: 0.5
      use_velocity_scaled_lookahead_dist: true
      lookahead_time: 1.5
      # Rotate-to-heading: if the carrot bearing is more than 45° off
      # the robot's heading, rotate in place first. Below that,
      # translate while steering.
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      # 2026-04-22 (session 9): 0.5 → 0.3 rad/s. See max_angular_accel
      # comment above — lower rotation velocity ceiling reduces
      # overshoot during terminal rotate-to-goal-heading.
      rotate_to_heading_angular_vel: 0.3
      # Regulated scaling — slow down in tight curves; cost-regulated
      # scaling is OFF because our costmap is very lightly inflated.
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.5
      regulated_linear_scaling_min_speed: 0.05
      # Collision checking along the path to the carrot; if an
      # obstacle will be hit within 1.0 s, slow/stop.
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_collision_detection: true
      allow_reversing: false
      transform_tolerance: 1.0

planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_footprint
      footprint: "[[0.10, 0.10], [0.10, -0.10], [-0.03, -0.10], [-0.03, 0.10]]"
      resolution: 0.05
      track_unknown_space: true
      transform_tolerance: 1.0
      # 2026-04-22 (session 8): make inflation explicit. Default Nav2
      # inflation_radius is 0.55 m, which halts forward planning for a
      # 10 cm half-width robot. Drop to 0.05 m (10 mm beyond footprint)
      # and raise cost_scaling_factor to 10.0 so costs decay quickly
      # past the inflation band. Static layer needs the SLAM-published
      # /map topic.
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.05

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_footprint
      footprint: "[[0.10, 0.10], [0.10, -0.10], [-0.03, -0.10], [-0.03, 0.10]]"
      resolution: 0.05
      rolling_window: true
      width: 3
      height: 3
      transform_tolerance: 1.0
      update_frequency: 5.0
      publish_frequency: 2.0
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          obstacle_max_range: 10.0
      # 2026-04-22 (session 8): inflation_radius 0.15 → 0.05,
      # cost_scaling_factor 3.0 → 10.0. Prior value inflated obstacles
      # (~30 cm from robot in test room) into a 45 cm danger zone that
      # scored every DWB forward trajectory as colliding. With 0.05 m
      # inflation the footprint sees ~20 cm of clear space — enough
      # for DWB's 15 cm forward projection (sim_time 1.0 × vx 0.15).
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.05

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.15, 0.0, 0.8]
    min_velocity: [-0.15, 0.0, -0.8]
    max_accel: [0.5, 0.0, 1.5]
    max_decel: [-0.5, 0.0, -1.5]
    # 2026-04-22 (session 9): same as bt_navigator — consume EKF output.
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    # Deadband sits BELOW DWB's min commands so the smoother never
    # zeroes out a valid controller output. Per 2026-04-22 motor
    # characterization, deadband ~50% of DWB min is safe.
    deadband_velocity: [0.01, 0.0, 0.075]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: cmd_vel_smoothed
    cmd_vel_out_topic: cmd_vel
    transform_tolerance: 0.5
    source_timeout: 5.0
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: /local_costmap/published_footprint
      time_before_collision: 2.0
      simulation_time_step: 0.1
      min_points: 6
      max_points: 6
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: scan
      topic: /scan

smoother_server:
  ros__parameters:
    use_sim_time: false


waypoint_follower:
  ros__parameters:
    use_sim_time: false


lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 10.0
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
      - collision_monitor

docking_server:
  ros__parameters:
    use_sim_time: false
    dock_plugins: ["nav2_dock"]
    nav2_dock:
      plugin: "opennav_docking::SimpleChargingDock"
