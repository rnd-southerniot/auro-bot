# camera_ros (libcamera) parameters for the Pi Camera Module 3 on the Pi 5.
# Applied to the upstream camera_ros node; tune once the module is connected.
camera:
  ros__parameters:
    width: 1280
    height: 720
    format: "RGB888"
    # camera: 0          # CSI camera index if multiple
    # frame_id: "camera_link"

navbot_camera_frame_grabber:
  ros__parameters:
    image_topic: "/camera/image_raw"
    status_period: 1.0
    # save_dir defaults to ~/navbot_captures/frames
