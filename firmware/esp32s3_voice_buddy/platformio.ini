; ESP32-S3 Voice Buddy — robot voice + face front-end (ESP-IDF).
; Board: ESP32-S3-WROOM-1-N16R8 (16 MB flash, 8 MB octal PSRAM).
; USB is a CH343 bridge wired to UART0 -> that UART is the Pi link (see PROTOCOL.md),
; so the IDF console is moved OFF UART0 (sdkconfig: ESP_CONSOLE_UART_NONE).
;
; Build/flash on the Mac (where the board lives):
;   pio run -e claude-buddy-voice -t upload
; Set upload_port to the board's /dev/cu.usbmodem* (see `pio device list`).

[platformio]
; Native ESP-IDF layout: the IDF component lives in main/ (not src/).
; Required for PlatformIO to build this project.
src_dir = main

[env:claude-buddy-voice]
platform = espressif32 @ ^6.7.0
board = esp32-s3-devkitc-1
framework = espidf

board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv

; CH343 bridge; the link runs at 1 Mbps (set in firmware), this is just monitor.
monitor_speed = 115200
; upload_port = /dev/cu.usbmodemXXXX   ; uncomment + set on the Mac
; monitor_port = /dev/cu.usbmodemXXXX

build_flags =
    -DBOARD_HAS_PSRAM
